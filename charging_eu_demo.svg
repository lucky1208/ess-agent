  <text x="520" y="570" fill="#c2c0b6" font-size="9">9 K4 合闸 → 10 DC 补电</text>
  <text x="520" y="584" fill="#c2c0b6" font-size="9">12 AC 补电 (KM1/KM2/K9/K10/K6)</text>
  <text x="520" y="598" fill="#c2c0b6" font-size="9">19 整车 EV → 23 30kW DC/DC</text>
  <text x="520" y="612" fill="#c2c0b6" font-size="9">25 闭锁 → 27 急停统一处理</text>
