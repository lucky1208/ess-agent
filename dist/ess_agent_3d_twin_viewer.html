<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESS Agent - 3D Twin Viewer (Microgrid Digital Twin)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1d;
            overflow: hidden;
            font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
            color: #e0e6ed;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD Overlay */
        .hud-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(180deg, rgba(10,15,29,0.95) 0%, rgba(10,15,29,0.6) 100%);
            border-bottom: 1px solid rgba(0,240,255,0.15);
            display: flex;
            align-items: center;
            padding: 0 16px;
            pointer-events: auto;
        }
        .top-bar .logo {
            font-size: 16px; font-weight: 700;
            color: #00f0ff;
            letter-spacing: 1px;
            margin-right: 32px;
        }
        .top-bar .nav-tabs {
            display: flex; gap: 4px;
        }
        .top-bar .nav-tab {
            padding: 8px 16px;
            font-size: 13px; color: #8b9bb4;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .top-bar .nav-tab:hover { color: #00f0ff; background: rgba(0,240,255,0.08); }
        .top-bar .nav-tab.active {
            color: #00f0ff;
            background: rgba(0,240,255,0.12);
            border-color: rgba(0,240,255,0.3);
        }

        /* Status Tags */
        .status-tags {
            position: absolute;
            top: 72px; left: 24px;
            display: flex; gap: 8px;
            pointer-events: auto;
        }
        .status-tag {
            padding: 6px 12px;
            font-size: 11px; font-weight: 600;
            border-radius: 4px;
            border: 1px solid;
            cursor: pointer;
            transition: all 0.3s;
        }
        .status-tag.live { color: #00ff88; border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.1); }
        .status-tag.pcs { color: #00f0ff; border-color: rgba(0,240,255,0.4); background: rgba(0,240,255,0.1); }
        .status-tag.bess { color: #ffd700; border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.1); }
        .status-tag.pv { color: #ff8c00; border-color: rgba(255,140,0,0.4); background: rgba(255,140,0,0.1); }

        /* Bottom Dashboard */
        .bottom-dashboard {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 56px;
            background: linear-gradient(0deg, rgba(10,15,29,0.95) 0%, rgba(10,15,29,0.4) 100%);
            border-top: 1px solid rgba(0,240,255,0.15);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 20px;
            pointer-events: auto;
        }
        .metric-card {
            display: flex; flex-direction: column;
            min-width: 90px;
        }
        .metric-label {
            font-size: 10px; color: #8b9bb4;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .metric-value {
            font-size: 20px; font-weight: 700;
            color: #00f0ff;
            font-variant-numeric: tabular-nums;
        }
        .metric-unit {
            font-size: 11px; color: #8b9bb4;
            margin-left: 2px;
        }
        .metric-sub {
            font-size: 10px; color: #00ff88;
            margin-top: 1px;
        }

        /* Camera Presets */
        .camera-presets {
            position: absolute;
            right: 24px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto;
        }
        .preset-btn {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: rgba(10,15,29,0.8);
            border: 1px solid rgba(0,240,255,0.2);
            color: #00f0ff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .preset-btn:hover {
            background: rgba(0,240,255,0.15);
            border-color: rgba(0,240,255,0.5);
            transform: scale(1.05);
        }

        /* Device Info Panel */
        .device-panel {
            position: absolute;
            right: 80px; top: 72px;
            width: 320px;
            background: rgba(10,15,29,0.92);
            border: 1px solid rgba(0,240,255,0.3);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
        }
        .device-panel.active {
            opacity: 1;
            transform: translateX(0);
        }
        .panel-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,240,255,0.15);
        }
        .panel-icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: rgba(0,240,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .panel-title {
            font-size: 15px; font-weight: 600;
            color: #e0e6ed;
        }
        .panel-status {
            font-size: 11px; color: #00ff88;
            margin-top: 2px;
        }
        .panel-data-row {
            display: flex; justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .panel-data-label {
            font-size: 12px; color: #8b9bb4;
        }
        .panel-data-value {
            font-size: 13px; font-weight: 600;
            color: #e0e6ed;
            font-variant-numeric: tabular-nums;
        }
        .panel-actions {
            display: flex; gap: 8px;
            margin-top: 16px;
        }
        .panel-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid rgba(0,240,255,0.3);
            background: rgba(0,240,255,0.08);
            color: #00f0ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .panel-btn:hover {
            background: rgba(0,240,255,0.2);
        }
        .panel-btn.danger {
            border-color: rgba(255,0,60,0.3);
            background: rgba(255,0,60,0.08);
            color: #ff003c;
        }
        .panel-btn.danger:hover {
            background: rgba(255,0,60,0.2);
        }

        /* Loading */
        .loading-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0f1d;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-ring {
            width: 60px; height: 60px;
            border: 3px solid rgba(0,240,255,0.1);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 16px;
            font-size: 13px; color: #8b9bb4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">INITIALIZING DIGITAL TWIN...</div>
    </div>

    <div id="canvas-container"></div>

    <div class="hud-overlay">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">◉ ESS AGENT TWIN</div>
        </div>

        <!-- Status Tags -->
        <div class="status-tags">
            <div class="status-tag live">● LIVE</div>
            <div class="status-tag pcs">PCS</div>
            <div class="status-tag bess">BESS</div>
            <div class="status-tag pv">PV</div>
        </div>

        <!-- Camera Presets -->
        <div class="camera-presets">
            <div class="preset-btn" data-preset="bird" title="鸟瞰">⬥</div>
            <div class="preset-btn" data-preset="bess" title="储能">🔋</div>
            <div class="preset-btn" data-preset="pcs" title="PCS">⚡</div>
            <div class="preset-btn" data-preset="pv" title="光伏">☀</div>
            <div class="preset-btn" data-preset="grid" title="电网">🏭</div>
        </div>

        <!-- Device Info Panel -->
        <div class="device-panel" id="devicePanel">
            <div class="panel-header">
                <div class="panel-icon" id="panelIcon">🔋</div>
                <div>
                    <div class="panel-title" id="panelTitle">国轩 5MWh 储能柜</div>
                    <div class="panel-status" id="panelStatus">● 正常运行</div>
                </div>
            </div>
            <div id="panelData"></div>
            <div class="panel-actions">
                <button class="panel-btn" onclick="toggleDevice()">启停控制</button>
                <button class="panel-btn danger" onclick="simulateFault()">故障模拟</button>
            </div>
        </div>

        <!-- Bottom Dashboard -->
        <div class="bottom-dashboard">
            <div class="metric-card">
                <div class="metric-label">总负荷</div>
                <div><span class="metric-value" id="metricLoad">0</span><span class="metric-unit">kW</span></div>
                <div class="metric-sub" id="metricLoadSub">待接入</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">光伏出力</div>
                <div><span class="metric-value" id="metricPV">0</span><span class="metric-unit">kW</span></div>
                <div class="metric-sub" id="metricPVSub">辐照度 0 W/m²</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">储能功率</div>
                <div><span class="metric-value" id="metricBESS">0</span><span class="metric-unit">kW</span></div>
                <div class="metric-sub" id="metricBESSSub">待机 | SOC 65%</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">PCC并网</div>
                <div><span class="metric-value" id="metricPCC">0</span><span class="metric-unit">kW</span></div>
                <div class="metric-sub" id="metricPCCSub">电压 10.02 kV</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">今日收益</div>
                <div><span class="metric-value" id="metricRevenue">¥0</span></div>
                <div class="metric-sub">削峰填谷 + 需量控制</div>
            </div>
        </div>
    </div>

    <!-- Three.js & Dependencies -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { SSAOPass } from 'three/addons/postprocessing/SSAOPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ============================================
        // 1. SCENE SETUP
        // ============================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1d);
        scene.fog = new THREE.Fog(0x0a0f1d, 80, 250);

        // Renderer
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: 'high-performance'
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // ============================================
        // 2. ISOMETRIC CAMERA (30°俯视)
        // ============================================
        const aspect = window.innerWidth / window.innerHeight;
        const d = 40;
        const camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 1, 500
        );
        camera.position.set(40, 40, 40);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minZoom = 0.3;
        controls.maxZoom = 3;
        controls.target.set(0, 5, 0);

        // Camera Presets
        const presets = {
            bird: { pos: new THREE.Vector3(40, 40, 40), target: new THREE.Vector3(0, 5, 0) },
            bess: { pos: new THREE.Vector3(-25, 12, 15), target: new THREE.Vector3(-25, 8, 0) },
            pcs: { pos: new THREE.Vector3(0, 15, 20), target: new THREE.Vector3(0, 8, 0) },
            pv: { pos: new THREE.Vector3(30, 12, -25), target: new THREE.Vector3(30, 5, -25) },
            grid: { pos: new THREE.Vector3(-40, 15, 0), target: new THREE.Vector3(-30, 8, 0) }
        };

        function flyToPreset(name, duration = 1200) {
            const preset = presets[name];
            if (!preset) return;

            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            const startTime = performance.now();

            function animate() {
                const elapsed = performance.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3);

                camera.position.lerpVectors(startPos, preset.pos, ease);
                controls.target.lerpVectors(startTarget, preset.target, ease);
                controls.update();

                if (t < 1) requestAnimationFrame(animate);
            }
            animate();
        }

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => flyToPreset(btn.dataset.preset));
        });

        // ============================================
        // 3. LIGHTING SYSTEM (HDR-like with multiple lights)
        // ============================================
        const ambientLight = new THREE.AmbientLight(0x4a6fa5, 0.4);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0x4a6fa5, 0x1a1a2e, 0.6);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 80, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 200;
        dirLight.shadow.camera.left = -60;
        dirLight.shadow.camera.right = 60;
        dirLight.shadow.camera.top = 60;
        dirLight.shadow.camera.bottom = -60;
        dirLight.shadow.bias = -0.001;
        dirLight.shadow.normalBias = 0.02;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.3);
        fillLight.position.set(-30, 40, -20);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0x00f0ff, 0.3);
        rimLight.position.set(0, 10, 40);
        scene.add(rimLight);

        // ============================================
        // 4. GROUND & ENVIRONMENT (drawn first)
        // ============================================
        const groundLayer = new THREE.Group();
        groundLayer.name = 'GroundLayer';
        groundLayer.renderOrder = -9998;
        scene.add(groundLayer);

        const gridHelper = new THREE.GridHelper(200, 100, 0x1e3a5f, 0x0f1f3a);
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        gridHelper.renderOrder = -9998;
        groundLayer.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x1a1f2e,
            roughness: 0.9,
            metalness: 0.0,
            depthWrite: true,
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.1;
        floor.receiveShadow = true;
        floor.renderOrder = -9998;
        groundLayer.add(floor);

        const reflectGeo = new THREE.PlaneGeometry(200, 200);
        const reflectMat = new THREE.MeshBasicMaterial({
            color: 0x0a0f1d,
            transparent: true,
            opacity: 0.15,
            depthWrite: false,
        });
        const reflectPlane = new THREE.Mesh(reflectGeo, reflectMat);
        reflectPlane.rotation.x = -Math.PI / 2;
        reflectPlane.position.y = -0.05;
        reflectPlane.renderOrder = -9997;
        groundLayer.add(reflectPlane);

        // ============================================
        // 5. SHADOW DISC HELPER (grounds tall devices)
        // ============================================
        function createShadowDisc(x, y, z, radius, opacity) {
            const discGeo = new THREE.CylinderGeometry(radius, radius, 0.02, 24);
            const discMat = new THREE.MeshBasicMaterial({
                color: 0x000000,
                transparent: true,
                opacity: opacity || 0.35,
                depthWrite: false,
            });
            const disc = new THREE.Mesh(discGeo, discMat);
            disc.position.set(x, 0.02, z);
            disc.renderOrder = -9996;
            disc.receiveShadow = true;
            scene.add(disc);
            return disc;
        }

        // ============================================
        // 6. PBR MATERIAL LIBRARY
        // ============================================
        const Materials = {
            metalEnclosure: new THREE.MeshStandardMaterial({
                color: 0x7a8a9a,
                roughness: 0.3,
                metalness: 0.8,
            }),
            paintedSurface: new THREE.MeshStandardMaterial({
                color: 0xf5f5f5,
                roughness: 0.2,
                metalness: 0.4,
            }),
            glass: new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.05,
                metalness: 0.0,
                transparent: true,
                opacity: 0.3,
            }),
            copper: new THREE.MeshStandardMaterial({
                color: 0xb87333,
                roughness: 0.25,
                metalness: 0.9,
            }),
            warning: new THREE.MeshStandardMaterial({
                color: 0xffd200,
                roughness: 0.6,
                metalness: 0.0,
                emissive: 0xffd200,
                emissiveIntensity: 0.1,
            }),
            coolingPipe: new THREE.MeshStandardMaterial({
                color: 0x1e90ff,
                roughness: 0.1,
                metalness: 0.1,
                transparent: true,
                opacity: 0.6,
                emissive: 0x00f0ff,
                emissiveIntensity: 0.3,
            }),
            pvPanel: new THREE.MeshStandardMaterial({
                color: 0x1e3a8a,
                roughness: 0.15,
                metalness: 0.3,
                transparent: true,
                opacity: 0.75,
            }),
            diesel: new THREE.MeshStandardMaterial({
                color: 0xff6b00,
                roughness: 0.2,
                metalness: 0.4,
            }),
            concrete: new THREE.MeshStandardMaterial({
                color: 0x555555,
                roughness: 0.9,
                metalness: 0.0,
            }),
            statusGreen: new THREE.MeshStandardMaterial({
                color: 0x00ff88,
                emissive: 0x00ff88,
                emissiveIntensity: 1.0,
            }),
            statusYellow: new THREE.MeshStandardMaterial({
                color: 0xffd200,
                emissive: 0xffd200,
                emissiveIntensity: 1.0,
            }),
            statusRed: new THREE.MeshStandardMaterial({
                color: 0xff003c,
                emissive: 0xff003c,
                emissiveIntensity: 1.0,
            }),
        };

        // ============================================
        // 7. ENERGY FLOW SHADER (UV Scroll + Particle)
        // ============================================
        const energyFlowVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;

            void main() {
                vUv = uv;
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const energyFlowFragmentShader = `
            uniform float uTime;
            uniform float uPower;
            uniform vec3 uColor;
            uniform vec3 uGlowColor;
            uniform float uSpeed;

            varying vec2 vUv;
            varying vec3 vPosition;

            void main() {
                float flowSpeed = 0.5 + uPower * 3.0;
                float scrolledU = vUv.x + uTime * flowSpeed * uSpeed;

                float segment = fract(scrolledU * 8.0);
                float segmentEdge = smoothstep(0.0, 0.1, segment) * smoothstep(1.0, 0.9, segment);

                float core = smoothstep(0.5, 0.0, abs(vUv.y - 0.5));

                float pulse = sin(uTime * (2.0 + uPower * 4.0)) * 0.15 + 0.85;

                float intensity = (0.3 + uPower * 1.2) * pulse;

                vec3 finalColor = mix(uColor, uGlowColor, segmentEdge);
                float alpha = core * intensity * (0.4 + segmentEdge * 0.6);

                gl_FragColor = vec4(finalColor * intensity, alpha);
            }
        `;

        function createEnergyFlowMaterial(color, glowColor, speed = 1.0) {
            return new THREE.ShaderMaterial({
                vertexShader: energyFlowVertexShader,
                fragmentShader: energyFlowFragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uPower: { value: 0.8 },
                    uColor: { value: new THREE.Color(color) },
                    uGlowColor: { value: new THREE.Color(glowColor) },
                    uSpeed: { value: speed },
                },
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });
        }

        const FlowColors = {
            pv: { color: 0x8B7355, glow: 0xFFD700 },
            charge: { color: 0x4A90E2, glow: 0x00F0FF },
            discharge: { color: 0x2E8B57, glow: 0x00FF88 },
            reverse: { color: 0x8B0000, glow: 0xFF003C },
            comm: { color: 0x9370DB, glow: 0xDA70D6 },
        };

        // ============================================
        // 8. DEVICE BUILDERS
        // ============================================
        const devices = [];
        const raycastTargets = [];

        // 8.1 BESS Energy Storage Cabinet (国轩 5MWh)
        function createBESS(x, z, name = "国轩 5MWh 储能柜") {
            const group = new THREE.Group();
            group.position.set(x, 0, z);
            group.userData = { type: 'bess', name, power: -500, soc: 65 };
            group.renderOrder = 100;

            // Shadow disc
            createShadowDisc(x, 0, z, 4, 0.3);

            const bodyGeo = new THREE.BoxGeometry(12, 6, 5);
            const body = new THREE.Mesh(bodyGeo, Materials.metalEnclosure);
            body.position.y = 3;
            body.castShadow = true;
            body.receiveShadow = true;
            body.renderOrder = 100;
            group.add(body);

            for (let i = 0; i < 8; i++) {
                const ribGeo = new THREE.BoxGeometry(12.1, 0.3, 0.1);
                const rib = new THREE.Mesh(ribGeo, Materials.metalEnclosure);

        // ============================================
        // 9. BUS LINES & ENERGY FLOWS (straight lines, no arcs)
        // ============================================
        const busLineLayer = new THREE.Group();
        busLineLayer.name = 'BusLineLayer';
        busLineLayer.renderOrder = -9999;
        scene.add(busLineLayer);

        const flows = [];

        function createBusLine(startArr, endArr, colorType, power = 0.8) {
            const start = new THREE.Vector3(...startArr);
            const end = new THREE.Vector3(...endArr);
            const curve = new THREE.LineCurve3(start, end);
            const tubeGeo = new THREE.TubeGeometry(curve, 22, 0.12, 8, false);

            const colors = FlowColors[colorType] || FlowColors.charge;
            const mat = createEnergyFlowMaterial(colors.color, colors.glow);
            mat.uniforms.uPower.value = power;

            const tube = new THREE.Mesh(tubeGeo, mat);
            tube.userData = { isFlow: true, power };
            tube.renderOrder = -9999;
            busLineLayer.add(tube);
            flows.push(tube);
            return tube;
        }

        // ============================================
        // 10. BUILD THE SCENE
        // ============================================
        const bess = createBESS(-25, 0);
        const pcs = createPCS(0, 0);
        const pv = createPVArray(25, -20);
        const transformer = createTransformer(-40, 0);
        const grid = createGridConnection(-55, 0);
        const ems = createEMS(0, 15);

        // Bus Lines (straight connections, no arcs)
        // Grid → Transformer → PCS
        createBusLine([-55, 8, 0], [-40, 7, 0], 'charge', 0.9);
        createBusLine([-40, 7, 0], [-2, 8, 0], 'charge', 0.8);

        // PV → PCS
        createBusLine([25, 3, -20], [2, 8, 0], 'pv', 0.7);

        // PCS → BESS (Charging)
        createBusLine([0, 8, 0], [-25, 6, 0], 'charge', 0.6);

        // BESS → PCS (Discharging - will toggle)
        const dischargeFlow = createBusLine([-25, 6, 0], [0, 6, 0], 'discharge', 0.0);

        // PCS → Transformer → Grid (when discharging/feeding)
        createBusLine([2, 6, 0], [-40, 5, 0], 'discharge', 0.0);

        // EMS → PCS (Communication)
        createBusLine([0, 6, 15], [0, 8, 2], 'comm', 0.3);

        // ============================================
        // 11. POST-PROCESSING (Bloom + SSAO + Tone Mapping)
        // ============================================
        const composer = new EffectComposer(renderer);

        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const ssaoPass = new SSAOPass(scene, camera, window.innerWidth, window.innerHeight);
        ssaoPass.kernelRadius = 16;
        ssaoPass.minDistance = 0.005;
        ssaoPass.maxDistance = 0.1;
        composer.addPass(ssaoPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        composer.addPass(bloomPass);

        const outputPass = new OutputPass();
        composer.addPass(outputPass);

        // ============================================
        // 12. INTERACTION SYSTEM
        // ============================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredDevice = null;
        let selectedDevice = null;

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(raycastTargets);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                const device = obj.parent;
                if (device !== hoveredDevice) {
                    if (hoveredDevice) setRimIntensity(hoveredDevice, 0);
                    hoveredDevice = device;
                    setRimIntensity(device, 0.5);
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (hoveredDevice) {
                    setRimIntensity(hoveredDevice, 0);
                    hoveredDevice = null;
                    document.body.style.cursor = 'default';
                }
            }
        });

        window.addEventListener('click', (e) => {
            if (hoveredDevice) {
                selectDevice(hoveredDevice);
            } else {
                hideDevicePanel();
            }
        });

        function setRimIntensity(device, intensity) {
            device.traverse(child => {
                if (child.userData.isBorder) {
                    child.material.opacity = intensity * 0.3;
                }
            });
        }

        function selectDevice(device) {
            selectedDevice = device;
            const data = device.userData;
            const panel = document.getElementById('devicePanel');

            document.getElementById('panelTitle').textContent = data.name;
            document.getElementById('panelStatus').textContent = '● 正常运行';
            document.getElementById('panelStatus').style.color = '#00ff88';

            const icons = { bess: '🔋', pcs: '⚡', pv: '☀', transformer: '🔌', grid: '🏭', ems: '🖥' };
            document.getElementById('panelIcon').textContent = icons[data.type] || '◉';

            let dataHtml = '';
            if (data.bomModel) {
                dataHtml += `<div class="panel-data-row"><span class="panel-data-label">型号</span><span class="panel-data-value" style="font-size:10px">${data.bomModel}</span></div>`;
            }
            if (data.type === 'bess') {
                dataHtml = `
                    <div class="panel-data-row"><span class="panel-data-label">电压</span><span class="panel-data-value">1331.2 V</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">电流</span><span class="panel-data-value">375.4 A</span></div>

                    <div class="panel-data-row"><span class="panel-data-label">SOC</span><span class="panel-data-value">${data.soc}%</span></div>

                    <div class="panel-data-row"><span class="panel-data-label">SOH</span><span class="panel-data-value">98.2%</span></div>
                `;
            } else if (data.type === 'pcs') {
                dataHtml = `
                    <div class="panel-data-row"><span class="panel-data-label">AC电压</span><span class="panel-data-value">400 V</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">AC电流</span><span class="panel-data-value">1802 A</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">DC电压</span><span class="panel-data-value">1331 V</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">DC电流</span><span class="panel-data-value">375 A</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">功率</span><span class="panel-data-value">${data.power} kW</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">模式</span><span class="panel-data-value">${data.mode}</span></div>
                `;
            } else if (data.type === 'pv') {
                dataHtml = `
                    <div class="panel-data-row"><span class="panel-data-label">发电功率</span><span class="panel-data-value">${data.power} kW</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">辐照度</span><span class="panel-data-value">980 W/m²</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">MPPT效率</span><span class="panel-data-value">99.2%</span></div>
                    <div class="panel-data-row"><span class="panel-data-label">今日发电</span><span class="panel-data-value">3,420 kWh</span></div>
                `;
            }
            document.getElementById('panelData').innerHTML = dataHtml;

            panel.classList.add('active');

            const targetPos = device.position.clone().add(new THREE.Vector3(15, 12, 15));
            flyToPosition(targetPos, device.position.clone().add(new THREE.Vector3(0, 5, 0)));
        }

        function hideDevicePanel() {
            document.getElementById('devicePanel').classList.remove('active');
            selectedDevice = null;
        }

        function flyToPosition(position, target, duration = 1000) {
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            const startTime = performance.now();

            function animate() {
                const elapsed = performance.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3);

                camera.position.lerpVectors(startPos, position, ease);
                controls.target.lerpVectors(startTarget, target, ease);
                controls.update();

                if (t < 1) requestAnimationFrame(animate);
            }
            animate();
        }

        window.toggleDevice = function() {
            if (!selectedDevice) return;
            const data = selectedDevice.userData;
            data.power = data.power === 0 ? -500 : 0;
            alert(`${data.name} 功率已切换至 ${data.power} kW`);
        };

        window.simulateFault = function() {
            if (!selectedDevice) return;
            const data = selectedDevice.userData;

            selectedDevice.traverse(child => {
                if (child.userData.isBorder) {
                    child.material.color.setHex(0xff003c);
                    child.material.opacity = 0.6;
                }
            });

            document.getElementById('panelStatus').textContent = '● 故障告警';
            document.getElementById('panelStatus').style.color = '#ff003c';

            alert(`已模拟 ${data.name} 故障：BMS过温保护触发`);

            setTimeout(() => {
                selectedDevice.traverse(child => {
                    if (child.userData.isBorder) {
                        child.material.color.setHex(0x00f0ff);
                        child.material.opacity = 0;
                    }
                });
                document.getElementById('panelStatus').textContent = '● 正常运行';
                document.getElementById('panelStatus').style.color = '#00ff88';
            }, 3000);
        };

        // ============================================
        // 13. ANIMATION LOOP
        // ============================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            flows.forEach(flow => {
                if (flow.material.uniforms) {
                    flow.material.uniforms.uTime.value = time;
                }
            });

            devices.forEach(device => {
                device.traverse(child => {
                    if (child.userData.isFan) {
                        child.rotation.y += child.userData.speed;
                    }
                    if (child.userData.isHum) {
                        const scale = 1 + Math.sin(time * 3) * 0.05;
                        child.scale.set(scale, scale, 1);
                        child.material.opacity = 0.05 + Math.sin(time * 2) * 0.03;
                    }
                    if (child.userData.isNozzle) {
                        child.material.emissiveIntensity = 0.2 + Math.sin(time * 4) * 0.1;
                    }
                });
            });

            scene.traverse(obj => {
                if (obj.material && obj.material.emissive) {
                    const baseIntensity = obj.material.userData?.baseEmissive || 1.0;
                    obj.material.emissiveIntensity = baseIntensity + Math.sin(time * 2) * 0.2;
                }
            });

            controls.update();
            composer.render();
        }

        // ============================================
        // 14. RESIZE HANDLER
        // ============================================
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================
        // 15. POSTMESSAGE LISTENER (parent → iframe)
        // ============================================
        window.addEventListener('message', (e) => {
            const msg = e.data;
            if (!msg || !msg.type) return;
            if (msg.type === 'ess-update' && msg.data) {
                const d = msg.data;
                if (d.soc !== undefined) {
                    const subEl = document.getElementById('metricBESSSub');
                    if (subEl) {
                        const mode = d.pcsPower > 0 ? '充电中' : d.pcsPower < 0 ? '放电中' : '待机';
                        subEl.textContent = mode + ' | SOC ' + Math.round(d.soc) + '%';
                    }
                }
                if (d.loadPower !== undefined) {
                    const el = document.getElementById('metricLoad');
                    if (el) el.textContent = Math.abs(Math.round(d.loadPower)).toLocaleString();
                    const sub = document.getElementById('metricLoadSub');
                    if (sub && d.loadPower > 0) sub.textContent = '▲ 运行中';
                }
                if (d.pvPower !== undefined) {
                    const el = document.getElementById('metricPV');
                    if (el) el.textContent = Math.round(d.pvPower).toLocaleString();
                    const sub = document.getElementById('metricPVSub');
                    if (sub && d.pvPower > 0) sub.textContent = '辐照度 ' + Math.round(d.pvPower / 500 * 1000) + ' W/m²';
                }
                if (d.pcsPower !== undefined) {
                    const el = document.getElementById('metricBESS');
                    if (el) el.textContent = Math.round(d.pcsPower).toLocaleString();
                }
                if (d.gridPower !== undefined) {
                    const el = document.getElementById('metricPCC');
                    if (el) el.textContent = Math.round(d.gridPower).toLocaleString();
                }
                if (d.sizing) {
                    const s = d.sizing;
                    scene.traverse((obj) => {
                        if (obj.userData && obj.userData.type === 'bess') {
                            obj.userData.power = s.bessMW ? Math.round(s.bessMW * 1000) : obj.userData.power;
                            obj.userData.soc = d.soc || obj.userData.soc;
                        }
                        if (obj.userData && obj.userData.type === 'pcs') {
                            obj.userData.power = s.bessMW ? Math.round(s.bessMW * 1000) : obj.userData.power;
                        }
                        if (obj.userData && obj.userData.type === 'pv') {
                            obj.userData.power = s.pv || obj.userData.power;
                        }
                    });
                }
                if (d.bom && Array.isArray(d.bom)) {
                    const bomMap = {};
                    d.bom.forEach(b => { bomMap[b.item] = b; });
                    scene.traverse((obj) => {
                        if (!obj.userData || !obj.userData.type) return;
                        const t = obj.userData.type;
                        if (t === 'bess') {
                            const b = bomMap['储能电池系统BESS'];
                            if (b) { obj.userData.name = b.item + ' ' + (b.model||''); obj.userData.bomModel = b.model; }
                        }
                        if (t === 'pcs') {
                            const b = bomMap['PCS储能变流器'];
                            if (b) { obj.userData.name = b.item + ' ' + (b.model||''); obj.userData.bomModel = b.model; }
                        }
                        if (t === 'pv') {
                            const b = bomMap['光伏逆变器'];
                            if (b) { obj.userData.name = '光伏系统 ' + (b.model||''); obj.userData.bomModel = b.model; }
                        }
                        if (t === 'transformer') {
                            const b = bomMap['PCC并网开关柜'];
                            if (b) { obj.userData.name = b.item + ' ' + (b.model||''); obj.userData.bomModel = b.model; }
                        }
                        if (t === 'ems') {
                            const b = bomMap['微网EMS系统'];
                            if (b) { obj.userData.name = b.item + ' ' + (b.model||''); obj.userData.bomModel = b.model; }
                        }
                    });
                    const statusTags = document.querySelectorAll('.status-tag');
                    if (statusTags.length >= 4) {
                        const bBess = bomMap['储能电池系统BESS'];
                        const bPcs = bomMap['PCS储能变流器'];
                        const bPv = bomMap['光伏逆变器'];
                        if (bBess) statusTags[1].textContent = 'BESS ' + (bBess.model||'').substring(0,15);
                        if (bPcs) statusTags[2].textContent = 'PCS ' + (bPcs.model||'').substring(0,15);
                        if (bPv) statusTags[3].textContent = 'PV ' + (bPv.model||'').substring(0,15);
                    }
                }
            }
            if (msg.type === 'ess-cam-preset' && msg.preset) {
                if (typeof flyToPreset === 'function') flyToPreset(msg.preset);
            }
        });

        // ============================================
        // 16. INIT
        // ============================================
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);

        animate();
    </script>
</body>
</html>
