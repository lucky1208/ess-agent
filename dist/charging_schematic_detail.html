function buildSteps(){
  let lastSection = "";
  steps.forEach((step, i) => {
    if(step.section !== lastSection){
      const sec = document.createElement("div");
      sec.className = "flow-section";
      sec.innerHTML = `<div class="flow-section-title">${step.section}</div>`;
      stepList.appendChild(sec);
      lastSection = step.section;
    }
    const sec = stepList.lastElementChild;
    const btn = document.createElement("button");
    btn.className = "step-btn";
    btn.id = `step-${i}`;
    btn.innerHTML = `<span class="step-num">${step.code || ("Step " + (i+1))}</span><br>${step.title}<div class="step-desc">${step.desc}</div><div class="step-status"><span class="status-dot"></span><span>${i===0 ? "点击执行" : "等待中"}</span></div>`;

function applyT(){
  const t = `translate(${px}px,${py}px) scale(${sc})`;
  dc.style.transform = t;
  ov.style.transform = t;
  hlOv.style.transform = t;
  updateTagPositions();
}
function s2s(x,y){ return [x*sc + px, y*sc + py]; }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

function fitWhole(){
  const pad = 34;
  const sx = (wrap.clientWidth - pad*2) / SVG_W;
  const sy = (wrap.clientHeight - pad*2) / SVG_H;
  sc = Math.min(sx, sy);
  px = (wrap.clientWidth - SVG_W*sc) / 2;
  py = (wrap.clientHeight - SVG_H*sc) / 2;
  applyT();
}

function focusOn(box){
  const padX = 220, padY = 170;
  const next = Math.min(
    wrap.clientWidth / (box.w + padX),
    wrap.clientHeight / (box.h + padY)
  );
  sc = clamp(next, .22, .95);
  px = wrap.clientWidth/2 - (box.x + box.w/2)*sc;
  py = wrap.clientHeight/2 - (box.y + box.h/2)*sc;
  applyT();
}

wrap.addEventListener("mousedown", e => {
  dragging = true; lx = e.clientX; ly = e.clientY; wrap.classList.add("grabbing");
});
window.addEventListener("mouseup", () => { dragging = false; wrap.classList.remove("grabbing"); });
window.addEventListener("mousemove", e => {
  if(!dragging) return;
  px += e.clientX - lx; py += e.clientY - ly; lx = e.clientX; ly = e.clientY;
  applyT();
});
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const d = e.deltaY > 0 ? .88 : 1.14;
  px = mx - (mx - px) * d;
  py = my - (my - py) * d;
  sc = clamp(sc * d, .05, 4);
  applyT();
},{passive:false});

}

    d, class:"flow-line", stroke:segment.color, "stroke-width":segment.width || 5
  });
  const dot = makeSvg("circle", {
    r:segment.width ? segment.width + 1 : 6, class:"flow-dot", fill:"#ffffff"
  });
  flowGroup.appendChild(halo);
  flowGroup.appendChild(line);
  flowGroup.appendChild(dot);
  const len = line.getTotalLength();
  line.style.strokeDasharray = `${Math.min(120, len*.18)} ${len}`;
  halo.style.strokeDasharray = `${Math.min(135, len*.2)} ${len}`;
  activeFlows.push({line, halo, dot, len, order, reverse:segment.reverse});
}

function addHighlight(id){
  const c = components[id];
  if(!c) return;
  const rect = makeSvg("rect", {
    x:c.x, y:c.y, width:c.w, height:c.h, rx:c.rx ?? 3,
    fill:"none", stroke:c.color || C.batt, "stroke-width":2.2,
    filter:"url(#hl-glow)", opacity:.82
  });
  const shade = makeSvg("rect", {
    x:c.x, y:c.y, width:c.w, height:c.h, rx:c.rx ?? 3,
    fill:c.color || C.batt, opacity:.025
  });
  hlGroup.appendChild(shade);
  hlGroup.appendChild(rect);
  const tag = document.createElement("div");
  tag.className = "component-tag";
  tag.textContent = c.label;
  tagLayer.appendChild(tag);
  activeTags.push({el:tag,x:c.x,y:c.y});
}

function updateTagPositions(){
  activeTags.forEach(t => {
    const [x,y] = s2s(t.x, t.y);
    t.el.style.left = `${x}px`;
    t.el.style.top = `${y - 24}px`;
  });
}

function animate(ts){
  activeFlows.forEach(f => {
    const phase = ((ts/1000*spd) + f.order*.18) % 1;
    const p = f.reverse ? 1 - phase : phase;
    const dash = Math.min(150, f.len*.22);
    const offset = f.len - phase * (f.len + dash);
    f.line.style.strokeDashoffset = offset;
    f.halo.style.strokeDashoffset = offset;
    const pt = f.line.getPointAtLength(clamp(p * f.len, 0, f.len));
    f.dot.setAttribute("cx", pt.x);
    f.dot.setAttribute("cy", pt.y);
  });
  raf = requestAnimationFrame(animate);
}

function setStepButtonState(index){
  document.querySelectorAll(".step-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i === index);
    btn.classList.toggle("done", i < index);
    const status = btn.querySelector(".step-status span:last-child");
    if(i === index) status.textContent = "动态演示中";
    else if(i < index) status.textContent = "已讲解";
    else status.textContent = "等待中";
  });
}

function updateText(step){
  document.getElementById("detailTitle").textContent = step.title;
  document.getElementById("detailBody").textContent = step.body;
  const ul = document.getElementById("detailPoints");
  ul.innerHTML = "";
  step.points.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p;
    ul.appendChild(li);
  });
  document.getElementById("stageTitle").textContent = step.title;
  document.getElementById("stageText").textContent = step.body;
}

function runStep(index){
  currentStep = index;
  const step = steps[index];
  clearVisuals();
  setStepButtonState(index);
  updateText(step);
  step.components.forEach(addHighlight);
  step.flows.forEach(addFlow);
  focusOn(step.focus);
  raf = requestAnimationFrame(animate);
}

function setSpeed(v, btn){
  spd = v;
  document.querySelectorAll("[data-speed]").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
}

function toggleAuto(){
  const btn = document.getElementById("autoBtn");
  if(autoTimer){
    clearInterval(autoTimer); autoTimer = null; btn.classList.remove("on"); btn.textContent = "自动播放";
    return;
  }
  btn.classList.add("on"); btn.textContent = "停止播放";
  const start = currentStep >= 0 ? currentStep : 0;
  runStep(start);
  autoTimer = setInterval(() => {
    const next = (currentStep + 1) % steps.length;
    runStep(next);
  }, 7600 / spd);
}

document.querySelectorAll("[data-speed]").forEach(btn => {
  btn.addEventListener("click", () => setSpeed(Number(btn.dataset.speed), btn));
});
document.getElementById("autoBtn").addEventListener("click", toggleAuto);
document.getElementById("homeBtn").addEventListener("click", fitWhole);

buildSteps();
fitWhole();
const initialStep = Number(new URLSearchParams(location.search).get("step") ?? 0);
setTimeout(() => runStep(Number.isFinite(initialStep) && steps[initialStep] ? initialStep : 0), 350);
</script>
</body>
</html>
