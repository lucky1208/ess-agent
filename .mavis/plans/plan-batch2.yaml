version: 1
plan:
  name: '第二批储能Skill工程深化'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
tasks:
  - id: skill-iocontrol
    title: '新建调试验收二次回路与联动Skill'
    prompt: |
      任务：为储能电站微网项目创建调试验收Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_commissioning_iocontrol.md

      【Skill定位】
      本Skill用于：储能站现场电气二次回路接线检查、继电保护校验、联动逻辑时序测试、并网前整组传动试验。覆盖BMS→PCS→断路器→消防主机的完整联动链路测试。

      【必须包含的核心模块】

      一、二次回路完整性检查（≥160项清单）
      逐项列出检查清单，包含：
      - BMS→PCS CAN回路检查（CAN_H/CAN_L接线/终端电阻/波特率）
      - PCS→PCC断路器跳闸回路检查（保护跳闸/急停/使能信号硬接线）
      - 消防主机→BMS/PCS急停硬接线回路检查
      - EMS→PCS功率指令回路检查（模拟量/数字量/通信指令）
      - 防孤岛保护→PCC断路器跳闸回路检查
      - 继电保护装置→断路器跳闸回路检查
      - 电池舱温感/烟感→消防主机信号回路
      - 每个回路的检查方法、标准值、不合格处理方法

      二、继电保护定值校验
      - 变压器差动保护定值计算（制动系数、动作电流、灵敏度校验）
      - 出线过流保护三段式定值配合曲线
      - 零序电流保护定值（接地故障）
      - 低频减载/低压减载整定（频率/电压跌落触发值、时间延迟）
      - 防孤岛保护定值（ROCOF、欠压、过压、频率保护的具体参数）
      - 每一项保护给出计算公式和实际配置值示例

      三、联动逻辑时序测试
      - 完整联动链路时序图（从告警触发→保护判断→动作指令→断路器分断）
      - 关键时序指标：
        · 消防告警→PCS停机：≤500ms
        · 防孤岛检测→PCC分断：≤2s
        · EMS功率指令→PCS响应：≤1s
        · 继电保护动作→断路器分断：≤100ms
        · 调度AGC指令→实际功率变化：≤4s
      - 每条时序的录波验证方法和合格标准

      四、并网前继保整组传动试验
      - 整组传动试验步骤（继电器→断路器联动）
      - 保护动作录波分析要求
      - 整定值复核报告模板
      - 并网试验前的检查清单（≥50项）

      五、调试验收报告模板
      - 调试验收记录表格（回路编号/检查项目/方法/实测值/结论）
      - 继保定值核查表
      - 联动测试记录表（时序实测值记录）
      - 验收签字页格式

      【写作要求】
      - 总行数目标：≥1000行
      - 检查清单要可执行，工程师拿着可以直接验收
      - 继电保护定值要有实际计算案例，不是只有公式
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立验证以下内容：
      1. 文件路径存在，总行数≥1000行
      2. 二次回路检查清单是否包含≥160项具体检查内容
      3. 继电保护定值校验是否有实际计算案例（不是只有"需要计算"）
      4. 防孤岛保护定值是否包含ROCOF/欠压/过压/频率的具体数值
      5. 联动逻辑时序测试是否有5条以上时序指标的合格标准
      6. 并网前检查清单是否≥50项
      7. 调试验收报告是否有可直接使用的记录表格模板
      返回核查结论（每项通过/不通过+具体问题）
    timeout_ms: 2700000

  - id: skill-relay
    title: '新建继电保护整定计算Skill'
    prompt: |
      任务：为储能电站创建继电保护整定计算Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_relay_coordination.md

      【Skill定位】
      本Skill用于：储能系统继电保护整定计算，包含短路电流计算、保护配合设计、整定值确定。解决"储能并网时保护怎么配"这个核心工程问题。

      【必须包含的核心模块】

      一、储能系统短路电流计算
      - 电网侧最大/最小短路电流计算（电网等效阻抗、电压等级）
      - PCS并网时的等效短路容量分析
        · GFM（电压源型）PCS：短路贡献可达额定电流3-5倍
        · GFL（电流源型）PCS：短路贡献约1.1-1.2倍额定电流
        · 两种模式的差异对保护定值的影响
      - 电池侧短路电流（电池内阻模型、热失控风险）
      - 多PCS并联时的短路电流叠加计算
      - 计算示例（10MWh储能系统，额定功率5MW，示例计算）

      二、变压器保护整定
      - 变压器差动保护：
        · 制动系数K设定（0.5-0.6）
        · 动作电流Iop = K×Iratio（比率制动公式）
        · 灵敏度校验：Ksen = Ikt.min/Iop ≥ 1.5
        · 实际配置参数示例（额定电流/短路阻抗/CT变比）
      - 变压器过流保护：
        · 过负荷告警定值：1.05-1.1倍额定电流
        · 过流I段（电流速断）：躲过变压器励磁涌流
        · 过流II段（限时速断）：与出线保护配合
        · 过流III段（过负荷保护）：按变压器额定容量
      - 零序过流保护（接地故障）

      三、出线保护配合
      - 三段式电流保护整定原则
      - 与上一级保护的时间配合（配合曲线）
      - 灵敏度校验（最小短路电流/动作电流≥配合系数）
      - 含储能反向下限时潮流的配合策略

      四、电池侧保护配置
      - 簇级熔断器选型（额定电压/分断能力/安秒曲线）
      - PCS直流侧保护（直流断路器/隔离开关配置）
      - 电池簇间环流抑制设计

      五、LVRT/HVRT参数配置
      - 低电压穿越（LVRT）曲线：0.2s内不脱网、故障清除后有功恢复
      - 高电压穿越（HVRT）曲线：过电压保护定值
      - 无功响应要求（低电压时提供无功支撑）
      - 不同电网故障类型下的响应时序
      - 参数配置值示例（电压/时间/功率因数）

      六、保护配合时序图
      - 描述如何绘制保护配合曲线（横轴时间，纵轴电流）
      - 各保护段动作时间配合关系表
      - CT/VT配置校验（变比、准确级、负载计算）

      【写作要求】
      - 总行数目标：≥900行
      - 每个保护整定都要有实际计算案例
      - 短路电流计算要有具体数据代入
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立验证以下内容：
      1. 文件路径存在，总行数≥900行
      2. 短路电流计算是否有具体数据代入的计算示例
      3. GFM vs GFL PCS的短路电流差异是否有明确说明
      4. 变压器差动保护是否有制动系数/动作电流/灵敏度校验的实际计算
      5. LVRT/HVRT曲线是否有具体的电压-时间参数配置值
      6. 出线保护三段式整定是否有配合曲线描述
      7. 电池侧保护（簇级熔断器）是否有选型示例
      返回核查结论（每项通过/不通过+具体问题）
    timeout_ms: 2700000

  - id: skill-grid-connection
    title: '新建并网接入方案报告Skill'
    prompt: |
      任务：为储能电站创建并网接入方案报告Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_grid_connection_report.md

      【Skill定位】
      本Skill用于：储能项目并网前向电网公司提交接入系统方案设计报告。覆盖接入点选择论证、电气计算、并网柜方案、调度接口配置、并网申请材料清单。是微网项目交付的关键合规Skill。

      【必须包含的核心模块】

      一、接入系统方案设计（35kV/10kV）
      - 接入点选择论证方法
        · 公共连接点(PCC)选择原则（就近接入、容量匹配、产权分界）
        · 35kV vs 10kV接入的判断条件
        · 典型接入方式（一回T接/专线T接/开关站接入）
      - 接入系统电气计算
        · 潮流计算（正常/检修/事故三种方式）
        · 短路电流计算（最大/最小方式）
        · 调压计算（无功补偿配置计算）
        · 稳定校核（如电网公司有要求）
      - 并网柜/开关站方案
        · 并网柜电气接线图（一次接线图模板描述）
        · 计量点配置（高计/低计选择）
        · 保护配置（方向过流/距离/纵联差动选择）

      二、电网调度接口方案
      - AGC功率指令接口
        · IEC104接口配置（ASDU类型/IOA地址/COT配置）
        · 指令格式（单点/双点遥控、设点命令）
        · AGC响应时间要求（≤4s）和功率变化率限值
      - AVC无功控制接口
        · 无功功率调度指令格式
        · 功率因数控制模式 vs 无功功率控制模式
      - 调度数据网配置
        · 纵向加密装置配置（必须项，电力系统安全要求）
        · 调度数据网通道要求（主备通道、迂回路由）
      - 远动通信配置
        · 远动通信规约选择（IEC104/DLT634）
        · 远动数据配置（遥测/遥信/遥脉/遥控配置表）
        · 对时方案（NTP/IRIG-B）
      - 调度业务联系规范
        · 并网前需与调度签订的协议（调度协议/并网协议/购售电合同）
        · 调度命名编号规则

      三、并网申请材料清单
      - 接入申请报告模板
        · 报告章节结构（项目概况/接入方案/电气计算/保护配置/通信通道/结论）
        · 核心内容要点（每章节必须包含的内容）
      - 电气主接线图要求
        · 图纸规格和内容要求
        · 标注要求（设备参数/短路容量/保护定值）
      - 保护配置图
        · 图纸内容要求
      - 通信通道图
        · 图纸内容要求
      - 设备技术参数表
        · 必填字段清单（PCS/BMS/变压器/并网柜）
      - 型式试验报告清单
        · 必备认证（GB/T 34120/GB/T 36558/GB/T 34070等）
        · 第三方测试要求

      四、典型接入方案案例
      - 案例1：10kV用户侧工商业储能接入方案（浙江）
        · 接入方式/T接点/并网柜配置
        · 调度接口配置
        · 申请流程和时间节点
      - 案例2：35kV电网侧大储接入方案（江苏）
        · 接入点选择/开关站方案
        · 潮流计算结论
        · 并网柜和保护配置
      - 案例3：0.4kV低压并网（小区光储）
        · 低压接入的特殊要求
        · 保护配置简化方案

      【写作要求】
      - 总行数目标：≥900行
      - 接入申请报告要有可直接使用的模板结构
      - 调度接口配置要有实际参数配置示例
      - 案例要有完整的项目背景和具体配置数据
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立验证以下内容：
      1. 文件路径存在，总行数≥900行
      2. 接入申请报告是否有可直接使用的模板章节结构
      3. 调度接口是否有IEC104的实际配置参数示例
      4. 潮流计算是否包含三种方式的说明（正常/检修/事故）
      5. 调度数据网纵向加密配置是否作为必须项列出
      6. 典型接入案例是否≥3个，每个有具体配置数据
      7. 型式试验报告清单是否有明确的认证标准引用
      返回核查结论（每项通过/不通过+具体问题）
    timeout_ms: 2700000
