version: 1
plan:
  name: '第四批储能Skill工程深化'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
tasks:
  - id: skill-lifecycle
    title: '新建储能全生命周期管理Skill'
    prompt: |
      任务：创建储能电站全生命周期管理Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_bess_lifecycle_management.md

      【Skill定位】
      本Skill用于：储能电站从投运到退役的全生命周期运维管理，包含设备台账、寿命预测、健康管理、运维工单、备件管理、退役评估。是储能资产管理的核心Skill。

      【必须包含的核心模块】

      一、设备台账管理
      - 设备唯一编码规则（EMS设备编码规范：站点-设备类型-序号）
      - 设备台账字段规范（含≥30个必填字段）
        · 基本信息：设备ID/名称/类型/型号/厂家/出厂日期/质保期
        · 技术参数：额定功率/电压/电流/容量/效率
        · 运行信息：投运日期/累计运行时间/累计充放电次数
        · 关联信息：安装位置/PCC关系/拓扑连接
      - 设备更换记录管理（电芯替换/BMS替换/PCS替换的跟踪）
      - 设备台账查询API设计

      二、寿命预测与健康管理
      - SOH估算算法（多种方法对比）
        · 安时积分法（简单但漂移累积）
        · 开路电压OCV法（精度高，需静置）
        · 扩展卡尔曼滤波EKF（实时最优，推荐）
        · 放电曲线特征提取法（工业现场最实用）
        · 各算法适用场景对比
      - 衰减预测模型
        · 年衰减率趋势外推（基于历史数据线性回归）
        · 等效循环次数统计（按DOD权重计算）
        · 温度加速因子模型（Arrhenius方程）
        · 预测置信区间计算
      - 等效循环次数统计
        · DOD权重计算：每次循环等效次数 = (DOD/100)^1.5
        · 循环寿命预算：EOL = 设计循环次数 × SOH_factor
      - 关键器件剩余寿命预警
        · PCS IGBT剩余寿命（结温波动累积）
        · PCS电容剩余寿命（纹波电流累积）
        · BMS BCM芯片剩余寿命
        · 各器件预警阈值

      三、运维工单管理
      - 巡检计划自动生成
        · 按设备类型设置巡检周期（月度/季度/年度）
        · 巡检项目清单（PCS/BMS/变压器/并网柜）
        · 巡检路线优化
      - 缺陷工单闭环流程
        · 发现→登记→派发→处理→验收→归档
        · 缺陷等级分类（紧急/重大/一般/提示）
        · 处理时限要求（各级别对应时限）
        · 备件消耗与工单关联
      - 运维成本统计
        · 人工成本/备件成本/外协成本分类统计
        · 设备维保成本对比（同类设备横向对比）

      四、备件管理
      - 备件清单（核心备件建议库存量）
        · PCS备件：IGBT模块/电容/风扇/接触器
        · BMS备件：CMU板/采集线束/均衡模块
        · 电池备件：单体电芯/模组（需要专业处理）
        · 公用备件：断路器/熔断器/继电器
      - 备件消耗预测
        · 基于故障率的备件消耗预测
        · 最低安全库存计算
      - 梯次利用评估
        · SOH<80%电池的梯次利用评估
        · 梯次利用场景（工商业储能调峰/通信基站/低速电动车）

      五、退役评估
      - 电池残值评估
        · 残值 = 原始购置成本 × SOH × 回收系数
        · 回收系数参考（锂回收价格波动）
      - 退役决策树
        · 经济性边界：维保成本>收益时建议退役
        · 安全性边界：SOH<60%或频繁告警时强制退役
        · 政策边界：质保到期/法规变化触发评估

      六、运维报告模板
      - 月度运维报告结构
      - 年度运维报告结构
      - 设备健康度评分体系

      【写作要求】
      - 总行数目标：≥800行
      - SOH估算要有多个算法的完整对比和Python伪代码
      - 退役评估要有具体的计算公式
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥800行
      2. SOH估算是否有≥3种算法的完整描述和对比
      3. 等效循环次数计算是否有DOD权重公式
      4. 备件清单是否包含PCS/BMS/电池/公用四类备件
      5. 退役评估是否有具体的残值计算公式
      6. 运维工单闭环流程是否有5步标准流程
      7. 设备台账字段是否≥30个
      返回每项通过/不通过结论
    timeout_ms: 2700000

  - id: skill-wiring
    title: '新建接线图与电缆敷设Skill'
    prompt: |
      任务：创建储能电站接线图与电缆敷设Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_wiring_layout.md

      【Skill定位】
      本Skill用于：储能场站电气接线设计与电缆敷设方案，包含电气主接线图审图要点、电缆选型计算、电缆敷设规范、接地设计。是现场电气工程交付的核心Skill。

      【必须包含的核心模块】

      一、电气主接线图（SLD）审图要点
      - 常见主接线形式（单母线/单母线分段/双母线/简易环网）
        · 各种接线形式的适用场景
        · 储能场站典型接线选择
      - SLD图审查检查清单（≥50项）
        · 一次接线正确性
        · 短路耐受能力标注
        · 保护装置配置完整性
        · 计量点位置正确性
        · 并网点与产权分界标注
      - 图纸规范（比例/标注/符号国标对照）

      二、电缆选型计算
      - 电缆截面选择原则（温升/电压降/经济电流密度）
        · 按温升选截面积（I_z ≥ I_max）
        · 按电压降校验（△U ≤ 5%）
        · 按经济电流密度选截面积（年最大负荷利用小时数决定）
      - 典型电缆型号推荐（储能场站常用电缆）
        · 动力电缆：YJV22-8.7/15kV / WDZA-YJY
        · 控制电缆：KVV22 / WDZ-KVV
        · 通信电缆：CAT6A / 光缆
        · 电池簇电缆：柔性电池专用电缆（如BCS电缆）
      - 电缆载流量表（常用截面积×芯数×敷设方式对应载流量）
        · 表格形式给出常见规格（4×35mm²/4×50mm²/4×70mm²/4×95mm²/4×120mm²）
        · 不同敷设方式修正系数

      三、电缆敷设设计
      - 电缆通道设计（桥架/埋管/电缆沟）
        · 电缆桥架选型（铝合金/钢制，尺寸计算）
        · 电缆沟设计（截面计算/排水/防火）
        · 穿管设计（保护管选型/管径选择）
      - 电缆敷设间距规范
        · 同层电缆间距要求
        · 动力电缆与控制电缆间距（≥150mm）
        · 电缆与热管道间距（≥500mm）
      - 电缆标识规范
        · 线缆两端标识要求
        · 色标规定（交流A/B/C对应黄绿红，直流正极红/负极蓝）
        · 标识内容（起点/终点/用途/规格）

      四、接地设计
      - 等电位联结设计
        · 主等电位联结端子箱（MEB）配置
        · 设备等电位联结要求
        · 二次设备接地
      - 防雷接地
        · 接闪器（避雷针/避雷带）设置原则
        · 接地电阻要求（≤10Ω，高土壤电阻率地区≤30Ω）
        · 接地极选型（角钢/铜包钢/石墨接地模块）
      - 工作接地与保护接地分合设计
        · 变压器中性点接地方式（TN-S系统）
        · 电池系统接地（悬浮接地 vs 单点接地）
        · 通信系统接地（屏蔽层单端接地）

      五、典型电缆清册
      - PCS交流侧电缆清册（示例：额定功率500kW PCS的电缆配置）
      - 直流电缆清册（电池簇到PCS DC侧的电缆配置）
      - 控制电缆清册（继电保护/通信/告警回路）
      - 接地电缆清册（各设备接地连线规格）

      六、现场施工检查要点
      - 电缆敷设前检查
      - 电缆敷设中检查（弯曲半径/张力控制）
      - 电缆终端头制作检查
      - 接线完成后的绝缘/耐压测试
      - 接地电阻实测记录

      【写作要求】
      - 总行数目标：≥800行
      - 电缆选型计算要有实际数据代入示例
      - 电缆载流量表要有可直接使用的表格
      - 接地设计要有具体参数和计算方法
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥800行
      2. 电缆截面选择是否有温升/电压降/经济电流密度三维度计算
      3. 电缆载流量表是否包含≥5种常用规格的载流量数据
      4. SLD审图检查清单是否≥50项
      5. 接地设计是否有接地电阻计算公式
      6. 电缆敷设间距规范是否有具体数值（mm为单位）
      7. 典型电缆清册是否有PCS/直流/控制/接地四类完整示例
      返回每项通过/不通过结论
    timeout_ms: 2700000

  - id: skill-fire
    title: '新建储能消防系统设计Skill'
    prompt: |
      任务：创建储能电站消防系统设计Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_fire_protection.md

      【Skill定位】
      本Skill用于：储能电池舱消防系统设计，包含探测方式选型、灭火介质选择、联动逻辑设计、消防供配电设计、验收标准。是储能安全设计的核心Skill。

      【必须包含的核心模块】

      一、消防设计法规标准
      - 适用标准清单
        · GB 51048-2014《电化学储能电站设计规范》
        · GB/T 34120-2021《电化学储能系统储能变流器通用技术要求》
        · GB 50016《建筑设计防火规范》
        · DL 5027《电力设备典型消防规程》
        · 各省储能消防地方标准（2024-2025年最新）
      - 储能电站消防设计等级要求
        · 电池舱防火分区设计
        · 单舱面积限制（≤1500m²或按当地标准）
        · 防火墙耐火极限要求

      二、探测方式选型
      - 储能电池舱常用探测方式对比
        · 感烟探测器（适用场合/选型/布置）
        · 感温探测器（适用场合/选型/布置）
        · 可燃气体探测器（氢气/电解液蒸气/CO）
        · 火焰探测器（红外/紫外）
        · 复合探测器（烟温复合/气体复合）
      - 探测器和布置设计
        · 探测器选型依据（火灾类型/环境条件）
        · 布置间距计算（保护半径法）
        · 安装高度要求
        · 防误报措施
      - 电化学储能专用探测
        · 电池热失控早期特征气体检测（CO/H2/VOC）
        · 温度梯度监测（簇间/模组间）
        · 烟雾颗粒浓度监测

      三、灭火介质选型
      - 各灭火介质对比分析
        · 水喷淋（全淹没式，适用≥2MW大容量储能）
        · 细水雾（近年储能项目推荐，低成本）
        · 七氟丙烷（HFC-227ea，适用于小空间）
        · 全氟己酮（FM-200/NIOSH 1230，新型清洁灭火剂）
        · 灭火器（磷酸铵盐干粉/CO2，移动式）
      - 储能电池舱灭火系统选型建议
        · 按容量分级选型（≤1MW/1-5MW/≥5MW）
        · 灭火剂用量计算方法
        · 喷头布置设计（均匀布置/保护区覆盖）
      - 热失控抑制供水系统
        · 水源保障（消防水箱/市政供水）
        · 供水管道设计（管径/压力计算）
        · 冷却水排放设计（防二次污染）

      四、消防联动逻辑设计
      - 消防告警到设备动作的完整联动链
        · 探测告警→BMS联动→PCS急停→断路器分断→灭火系统启动
        · 各联动环节时序要求（消防告警→PCS停机≤500ms）
        · 硬接线联动 vs 软件联动（双重保障原则）
      - 联动控制逻辑图（文字描述）
        · 触发条件：单一探测器告警/复合告警/消防主机确认
        · 动作指令：BMS停机/PCS停机/断路器跳闸/消防泵启动/声光报警
        · 复位条件：火灾解除→确认复位→逐步恢复供电
      - 消防系统与EMS联动
        · 告警信息通过硬接线/通信接口上报EMS
        · EMS显示消防告警位置和类型
        · 远程强制停机指令（调度/集控中心下发）

      五、消防供配电设计
      - 消防设备供电要求
        · 消防水泵/排烟风机：一级负荷供电
        · 火灾自动报警系统：主电源+备用电源（蓄电池）
      - 双电源切换装置配置
        · 末端双电源切换（ATS）
        · 供电线路冗余设计
      - 消防应急照明和疏散指示

      六、验收与检查
      - 消防系统验收检查表（≥40项）
      - 消防联动测试记录表
      - 灭火介质剩余量检测要求
      - 年度消防维护检查项目

      【写作要求】
      - 总行数目标：≥800行
      - 探测方式要有完整对比表格
      - 灭火介质选型要有按容量的分级建议
      - 消防联动逻辑要有完整的时序图描述
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥800行
      2. 适用标准是否包含≥4个国家标准（GB/DL规范）
      3. 探测方式选型是否有≥4种探测方式的对比表格
      4. 灭火介质选型是否有按容量的分级建议
      5. 消防联动逻辑是否有完整的时序描述（触发→动作→复位）
      6. 消防供配电双电源切换装置是否有配置要求
      7. 验收检查表是否≥40项
      返回每项通过/不通过结论
    timeout_ms: 2700000
