version: 1
plan:
  name: '第一批储能Skill深度重构'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
tasks:
  - id: skill-ems-strategy
    title: '深度重构EMS策略编译Skill'
    prompt: |
      任务：为储能电站EMS系统重构一个真正可部署的专业级Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_ems_strategy.md

      【Skill定位】
      本Skill用于：将自然语言/业务需求描述的储能策略编译为EMS系统可执行的YAML配置，同时提供各省2024-2025最新分时电价库、多目标优化配置模板、多时间尺度策略分层架构。

      【必须包含的核心模块】（每一块都要写透，不能只是提纲）

      一、各省分时电价库（2024-2025最新）
      - 表格形式收录至少15个省份的尖峰平谷时段和电价（广东、江苏、浙江、山东、北京、上海、四川、湖南、河南、湖北、陕西、安徽、福建、河北、辽宁）
      - 每个省份注明适用范围（分时电价版本号/执行日期）
      - 包含各省代理购电价格、偏差考核价格
      - 说明数据来源和更新机制（如何保持时效性）

      二、策略编译引擎（NLP→YAML）
      - 完整的YAML Schema定义，每个字段包含：名称、类型、默认值、单位、合法值范围、是否必填、含义说明、示例值
      - 削峰填谷策略参数（目标SOC范围、可调度窗口、充放电功率限值、收益计算公式）
      - 需量控制策略参数（需量阈值、响应延迟、恢复策略）
      - 应急备电策略参数（离网检测条件、V/f控制参数、并离网切换时序、黑启动参数）
      - 策略融合配置（多策略并行时的优先级矩阵、时序冲突消解算法、权重配置）

      三、多时间尺度分层架构
      - 日级调度层（00:00生成次日24h充放电计划，考虑峰谷时段、检修计划）
      - 小时级调度层（每15min滚动优化，响应光伏超发/负荷突变）
      - 秒级控制层（实时跟踪调度指令，防孤岛快速响应）

      四、容量与经济优化配置
      - 储能可用容量计算（SOH修正、备电容量预留）
      - 多目标优化配置（MILP参数设置、目标函数权重、约束条件配置）
      - 实时收益计算接口（当前SOC×实时电价→分钟收益）

      五、安全约束配置
      - BMS安全边界（SOC上下限、充放电电流限值、温度保护阈值）
      - PCS安全边界（有功/无功限值、过载时长、效率MAP）
      - 电网安全边界（并网功率限值、反向潮流禁止）
      - 消防联动策略（消防告警→立即停机→SOC释放）

      【写作要求】
      - 总字数目标：≥1200行
      - 必须是可直接用于工程实践的内容，不是教科书式概述
      - YAML Schema要完整可用，有参数验证逻辑说明
      - 各省电价数据要真实可查，不能编造
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立验证以下内容：
      1. 文件路径 E:\project\储能\ess-platform\skills\minimax_net_ems_strategy.md 是否存在，总行数≥1200行
      2. 各省分时电价库是否覆盖≥15个省份，每省包含尖峰平谷时段和电价（元/kWh）
      3. YAML Schema字段是否完整（每个字段有名称、类型、默认值、单位、合法值范围、是否必填、含义说明、示例值）
      4. 削峰填谷策略是否有完整的收益计算公式（峰谷电价差×放电容量的计算逻辑）
      5. 应急备电策略是否包含并离网切换的V/f控制参数（不是只有"需要配置"四个字）
      6. 多策略并行时是否有冲突消解算法（优先级矩阵或加权融合）
      7. BMS/PCS/电网安全边界是否有具体数值（不是只有"SOC限值"而没有具体数字）
      8. 文件整体结构是否清晰、章节完整
      返回核查结论（每项通过/不通过+具体问题）
    timeout_ms: 2700000

  - id: skill-deploy-v2
    title: '重构一键部署Skill为可执行版'
    prompt: |
      任务：重构储能电站EMS一键部署Skill，使其成为真正可执行的部署脚本+配置模板，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_oneclick_deploy.md

      【Skill定位】
      本Skill用于：工程师在储能站现场执行一键部署，包含完整的参数配置、可执行脚本、硬件预检、数据采集配置、EMQX规则引擎、TDengine数据库设计、备份恢复、远程运维。

      【必须包含的核心模块】

      一、现场预检脚本（bash/PowerShell）
      - 硬件环境检查（CPU架构/内存/NUMA/磁盘空间/网络连通性）
      - 依赖检查（Docker版本/docker-compose版本/Python版本/TDengine客户端）
      - 防火墙规则预检查（开放端口列表）
      - 输出预检报告，不通过则终止部署

      二、参数配置模板（.env格式）
      - 所有部署参数完整文档化，每个参数的含义、设置规则、合法值
      - 包含项目基本信息（站点名/容量/PCS台数/EMS版本）
      - 包含数据库配置（TDengine超级表名/数据保留周期/分片策略）
      - 包含MQTT配置（Broker地址/端口/认证/TLS配置）
      - 包含EMQX配置（规则引擎Topic映射/保留消息策略）

      三、EMS数据采集服务配置
      - Modbus TCP Master配置模板（设备IP/端口/寄存器映射/轮询周期）
      - Modbus RTU Master配置模板（串口参数/从站地址/点表）
      - IEC 104 Master配置模板（ASDU地址/IOA配置/COT配置/连接参数）
      - CAN采集配置（CAN ID过滤/波特率/消息解析规则）
      - 采集服务健康检查API

      四、EMQX规则引擎配置
      - 从MQTT Topic提取JSON数据的规则配置示例
      - 数据写入TDengine的规则引擎完整配置（超级表自动创建逻辑）
      - 告警路由规则（告警Topic→飞书/邮件通知配置）

      五、TDengine数据库设计
      - 超级表+子表命名规范
      - 超级表Schema定义（每个字段的TAG/SUPER TAG说明）
      - 连续查询(CQP)配置（1s原始数据→15min/1h降采样SQL模板）
      - 数据保留策略（TTAL配置/压缩级别/分区内核）
      - 按时间+设备分区的分区分片配置

      六、EMS核心服务Dockerfile/配置
      - EMS Core服务的Dockerfile示例（Python/Rust基础镜像/依赖安装/启动命令）
      - EMS API服务的docker-compose配置
      - EMS WebUI的nginx配置（反向代理/静态资源/SSL证书）
      - 策略引擎服务配置（策略脚本加载/运行时参数修改API）

      七、备份恢复脚本
      - 自动备份脚本（TDengine数据快照+配置文件+历史策略）
      - 备份保留策略（保留数量/保留周期）
      - 一键恢复脚本（从备份包恢复数据和配置）

      八、远程运维配置
      - frp内网穿透配置（ssh/rdp/自定义端口）
      - 或VPN配置（WireGuard服务端/客户端配置）
      - 远程日志查看脚本
      - 远程健康检查接口

      【写作要求】
      - 总字数目标：≥1200行
      - 所有脚本要求可直接复制使用（bash或PowerShell语法正确）
      - 参数说明要完整，工程师只需填配置值即可
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立验证以下内容：
      1. 文件路径 E:\project\储能\ess-platform\skills\minimax_net_oneclick_deploy.md 是否存在，总行数≥1200行
      2. 预检脚本是否包含具体的硬件检查命令（CPU/内存/磁盘/网络，不是只有"检查硬件"）
      3. .env参数配置是否有完整文档（每个参数都有名称/含义/设置规则/合法值）
      4. Modbus/ IEC104/ CAN采集配置是否包含具体的寄存器地址/IOA/CAN ID配置示例
      5. EMQX规则引擎是否包含从MQTT JSON写入TDengine的完整配置代码
      6. TDengine超级表Schema是否有TAG/列字段的完整定义
      7. 备份恢复脚本是否包含实际可执行的命令（不是"需要备份"这样的描述）
      8. 远程运维配置是否包含frp或WireGuard的具体配置参数
      返回核查结论（每项通过/不通过+具体问题）
    timeout_ms: 2700000

  - id: skill-capacity-sizing
    title: '新建储能容量优化选型Skill'
    prompt: |
      任务：为储能电站微网项目创建一个全新的容量优化选型Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_capacity_sizing.md

      【Skill定位】
      本Skill用于：微网项目投标/可研阶段，回答"配多少储能、配多大光伏、要不要柴发"这个核心问题。包含负荷分析、容量优化算法、经济性建模、多方案对比、敏感性分析、输出配置建议。

      【必须包含的核心模块】

      一、输入参数采集清单
      - 负荷数据采集模板（8760h详细数据/典型日数据/min-max均值）
      - 光伏发电数据采集（PVsyst仿真数据/卫星数据API/PVSAT）
      - 电价结构数据（分时电价/现货价格/容量电费/需量电费）
      - 可用资源约束（可用面积/安装倾角/变压器容量/并网限功率）
      - 投资约束（预算上限/IRR目标/回收期目标）
      - 保电需求（关键负荷清单/保电时长/SOC下限）
      - 政策补贴（各省新能源配储要求/补贴政策）

      二、储能容量优化算法（4种方法）
      - 方法A：基于峰谷套利的迭代法（不同配置下的年化收益计算，找到IRR最优配置）
        · 算法步骤、公式、收敛条件
        · 配置→收益→IRR的完整计算流程
        · Python伪代码示例
      - 方法B：基于风险调整收益最大化（IRRVaR方法）
        · 收益分布计算（蒙特卡洛模拟）
        · VaR/CVaR计算公式
        · 最优配置求解
      - 方法C：基于MILP的两阶段优化（日级+小时级）
        · 决策变量定义
        · 目标函数（运营成本最小化）
        · 约束条件（功率平衡/SOC/充放电效率/并网限功率）
        · Pyomo/Gurobi配置模板
      - 方法D：基于强化学习的自适应容量规划
        · 状态空间/动作空间/奖励函数定义
        · DQN或PPO算法框架
        · 适用场景说明

      三、光伏容量匹配算法
      - 自发自用率最优（负载匹配法）
        · 计算逻辑：自发自用率 = min(光伏发电量, 负荷用电量) / 光伏发电量
        · 迭代求最优光伏/负荷比
      - 消纳率约束下的最大光伏
        · 弃光率 = (光伏发电量 - 消纳量) / 光伏发电量
        · 约束：消纳率≥90%，求最大光伏装机
      - 变压器容量约束
        · 并网功率限制→最大光伏输出功率
        · 储能消纳逻辑

      四、经济性建模与对比矩阵
      - 全生命周期成本分解（CAPEX/OPEX/替换成本/残值）
      - 各方案IRR/NPV/回收期计算公式
      - 多方案对比矩阵模板（5个维度：经济/技术/安全/运维/灵活性）
      - 敏感性分析（电价变化/补贴退坡/设备降价/利用率下降）

      五、输出：推荐配置方案
      - 推荐配置表（光伏容量/储能容量/柴发容量/变压器增容）
      - 配置理由（为什么要配这个容量，核心计算逻辑）
      - 典型日能量平衡图（SVG格式文字描述）
      - 全生命周期经济性摘要（首年收益/IRR/回收期）

      六、典型案例参考
      - 至少3个典型案例（用户侧工商业/电网侧大储/微网离网）
      - 每个案例包含：项目背景→配置方案→核心参数→经济性结果

      【写作要求】
      - 总字数目标：≥1000行
      - 算法要有数学公式和计算逻辑，不是只说"用某个方法"
      - 案例数据要真实可信
      - 输出格式要可直接用于可研报告
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立验证以下内容：
      1. 文件路径 E:\project\储能\ess-platform\skills\minimax_net_capacity_sizing.md 是否存在，总行数≥1000行
      2. 储能容量优化是否包含≥3种算法（方法A/B/C/D），每个算法有明确的数学公式和计算步骤
      3. 光伏容量匹配是否包含自发自用率和消纳率两种计算逻辑
      4. 经济性建模是否包含IRR/NPV/回收期的完整计算公式
      5. 多方案对比矩阵是否有≥5个评价维度
      6. 典型案例是否≥3个，每个案例有完整的项目背景、配置方案、经济性结果
      7. 输出推荐配置方案是否包含具体的数字（不是只有"根据计算得出"的表述）
      8. 整体内容是否结构完整、有实际工程参考价值
      返回核查结论（每项通过/不通过+具体问题）
    timeout_ms: 2700000
