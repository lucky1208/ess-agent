version: 1
plan:
  name: '第三批储能Skill工程深化'
  max_concurrency: 4
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
tasks:
  - id: skill-battery-sizing
    title: '新建电池系统设计规范Skill'
    prompt: |
      任务：创建储能电池系统设计规范Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_battery_sizing_criteria.md

      【Skill定位】
      本Skill用于：电池系统选型和详细设计，包含电芯/模组/簇/舱的完整拓扑设计规范、液冷/风冷设计边界、BMS架构选型、电池舱设计规范。是储能系统设计的核心技术Skill。

      【必须包含的核心模块】

      一、电芯选型矩阵
      - LFP vs NMC vs NaS全维度对比（能量密度/循环寿命/低温性能/安全性/回收价值/成本）
      - 主流电芯品牌型号对比表（2024-2025年，宁德时代/比亚迪/亿纬/中创新航/LG/三星SDI等，含额定容量/电压/尺寸/重量/循环次数/质保）
      - 按场景推荐选型（用户侧工商业/电网侧大储/户用/高原低温）

      二、模组/簇拓扑设计
      - 串联数S计算（电压窗口匹配PCS DC范围）
        · 计算公式：S = ceil(V_pack_max / V_cell_max)
        · V_pack_max = PCS_DC_Voltage_Max（典型1200V或1500V）
        · 电芯串联数示例（280Ah电芯→384S for 1500V系统）
      - 并联数P计算（容量+电流匹配）
        · 单簇容量 = S × P × C_cell × V_cell_nom
        · 簇并联数决定总电流和PCS功率匹配
      - 簇间环流抑制设计（均压电阻/主动均衡）
      - 电池簇电气参数计算示例（给出完整数据代入）

      三、热管理系统设计
      - 风冷 vs 液冷设计边界
        · 风冷适用场景：＜2MW、舱内温差＜10°C、环境温度＜35°C
        · 液冷适用场景：≥2MW、高能量密度、高环温、高海拔
      - 液冷管路设计
        · 冷却液流量计算（Q = m × Cp × ΔT）
        · 管路压降计算
        · 温控算法（冷却液温度设定、流量控制策略）
      - 热失控防护设计（隔热/泄压/消防联动）

      四、BMS架构设计
      - 2级BMS vs 3级BMS架构选择边界
        · 2级：簇级管理（CMU + BMS主控），适用≤1MW
        · 3级：模组级管理（SMU + CMU + BMS主控），适用≥1MW
      - CAN菊花链 vs 星型网络的选型
        · 菊花链：布线简单，但故障隔离困难
        · 星型：独立通信，但布线复杂
        · 适用场景分析
      - SOC/SOH算法选型
        · 安时积分法（适用动态工况）
        · OCV法（适用于静置后校准）
        · EKF扩展卡尔曼滤波（精度最高，适用动态）
        · 各算法优缺点对比和选型建议

      五、电池舱设计规范
      - 舱体结构设计（承重/散热/防腐/防火分区）
        · 承重计算（满电舱重量计算）
        · IP防护等级要求
        · 防火分区设计（舱内电池簇之间的防火隔板）
      - 舱内布线规范（动力线/通信线分离走线）

      【写作要求】
      - 总行数目标：≥800行
      - 电芯选型表格要有实际型号和参数
      - 拓扑计算要有完整数据代入示例
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥800行
      2. 电芯选型矩阵是否有≥5个主流品牌的实际型号参数
      3. 串联数S计算是否有实际数据代入（不是只有公式）
      4. 液冷vs风冷是否有明确的设计边界条件
      5. BMS 2级 vs 3级架构是否有选择边界说明
      6. 电池舱设计是否有承重计算
      返回每项通过/不通过结论
    timeout_ms: 2700000

  - id: skill-pcs-spec
    title: '新建PCS规格书生成Skill'
    prompt: |
      任务：创建储能PCS变流器技术规格书生成Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_pcs_specification.md

      【Skill定位】
      本Skill用于：PCS采购招标技术规范书自动生成，包含所有必须的技术条款、性能指标、测试要求、验收指标。是储能系统采购环节的核心Skill。

      【必须包含的核心模块】

      一、PCS技术规格书自动生成模板
      - 输入参数：功率等级/电压等级/拓扑要求/认证要求
      - 输出：完整的PCS采购技术规范书（可直接用于招标文件）
      - 规范书章节结构（必须包含的所有章节）

      二、关键性能指标分解
      - 效率指标（保障值 vs 典型值，含测试方法和测试条件）
        · 额定效率：≥98%（保障值，不低于）
        · 最大效率：≥99%（典型值）
        · 德国标准/国标测试条件（参照GB/T 34120）
      - 功率因数范围：有功0~-0.9超前~+0.9滞后
      - THD限值（电流/电压谐波，参照GB/T 14549）
      - 噪声限值（dB(A)标准）
      - 待机功耗（自耗电，kW为单位）

      三、并网性能要求
      - LVRT低电压穿越
        · 标准：GB/T 34120或NB/T 31099
        · 曲线图描述（电压-时间穿越要求）
        · 无功电流响应要求（故障期间提供无功支撑）
      - HVRT高电压穿越
        · 穿越曲线参数
      - 一次调频参数
        · 有功-频率下垂系数（典型值0.04，即4%额定功率/Hz）
        · 响应时间和精度
      - AGC响应参数
        · 功率指令接收形式（IEC104/61850）
        · 响应时间要求（≤4s）
        · 功率变化率限制（ramp rate，典型10%/min）

      四、通信接口规范
      - Modbus TCP寄存器映射规范（点表格式模板）
        · 寄存器地址分配（遥测/遥信/控制）
        · 数据类型和比例系数
      - IEC 61850配置
        · LD（Logical Device）配置
        · SG（Logical Node）配置
        · GOOSE/SMV配置
      - 冗余通信配置（双网口/双机热备）

      五、型式试验要求
      - 型式试验项目清单（≥20项）
        · 并网性能测试（LVRT/HVRT/防孤岛）
        · 效率测试
        · 电能质量测试（谐波/电压波动/闪变）
        · 保护功能测试
        · 环境测试（高低温/湿热/振动）
        · EMC电磁兼容测试
      - 每个试验项目的测试方法/合格标准
      - 第三方测试机构要求（具备CNAS/CMA资质）

      六、验收检查表
      - 到货验收检查表（≥30项）
      - 出厂验收（FAT）检查表
      - 现场验收（SAT）检查表

      【写作要求】
      - 总行数目标：≥700行
      - 规格书模板可直接用于招标文件
      - 型式试验项目要完整（≥20项）
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥700行
      2. PCS规格书是否有完整的章节结构模板
      3. LVRT穿越曲线是否有具体的电压-时间参数
      4. 型式试验项目是否≥20项
      5. 效率指标是否有保障值和典型值的区分
      6. Modbus寄存器映射规范是否有地址分配示例
      7. 验收检查表是否≥30项
      返回每项通过/不通过结论
    timeout_ms: 2700000

  - id: skill-dashboard
    title: '新建EMS运营大屏设计Skill'
    prompt: |
      任务：创建储能电站EMS运营大屏设计规范Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_operation_dashboard.md

      【Skill定位】
      本Skill用于：储能电站运营监控大屏的设计规范，包含数据展示逻辑、告警优先级、运营KPI仪表盘、能量流向可视化、报表自动生成。是EMS人机界面的设计指南。

      【必须包含的核心模块】

      一、运营监控大屏设计规范
      - 数据展示层级架构
        · L1仪表盘：场站总览（功率/SOC/告警/收益）
        · L2设备详情：PCS/BMS/电表单独画面
        · L3曲线分析：历史数据查询/趋势分析
        · L4配置画面：参数设置/策略配置
      - 实时监控画面设计
        · 核心数据展示（实时功率/SOC/今日充放电量/今日收益）
        · 设备状态一览（可用/运行中/告警/离线）
        · 告警信息流（最新告警列表，带颜色分级）
      - 能量流向可视化
        · 桑基图（Sankey diagram）展示：电网→PCS→BMS→负荷的能量流向
        · 实时功率箭头动画（充放电方向）
        · SOC填充动画（电池图标颜色随SOC变化）
      - GIS地图+站点状态
        · 站点在地图上的位置标记
        · 状态颜色区分（绿=正常/黄=告警/红=故障）

      二、告警管理与分级展示
      - 告警分级标准（红/黄/蓝/灰四级，对应严重/中等/提示/已恢复）
        · 红色告警：设备故障/消防告警/通信中断（要求立即处理）
        · 黄色告警：参数越限/性能下降（需要关注）
        · 蓝色告警：系统提示/维护提醒（通知相关人员）
      - 告警列表设计（按时间/设备/级别筛选）
      - 告警历史统计（帕累托分析图表）
      - 告警抑制与收敛规则（单点告警→多设备告警收敛）

      三、运营KPI仪表盘
      - 实时收益计算（SOC×实时电价=分钟收益）
      - 月度/年度累计收益（今日/本月/本年的充电成本/放电收益/净收益）
      - 能效指标（充放电效率/自耗电率/系统可用率）
        · 充放电效率 = 放电电量 / 充电电量 × 100%
        · 自耗电率 = 自耗电量 / 充放电总电量 × 100%
        · 系统可用率 = 可用时间 / 统计时间 × 100%
      - 预测偏差分析（预测功率 vs 实际功率，对比曲线）

      四、报表自动生成
      - 日报/月报/年报模板（可导出Excel/PDF）
        · 日报：每15min功率/SOC/告警汇总
        · 月报：充放电量/收益/能效/告警统计
        · 年报：年度运行总结/设备状态/寿命评估
      - 电网调度报表格式（按电网公司要求）
      - 财务对账报表（购电/售电/补贴分开统计）

      五、技术实现建议
      - 前端技术选型（Vue3/React + ECharts/D3.js）
      - WebSocket实时数据推送架构
      - 移动端适配方案（响应式设计 or 小程序）
      - 数据缓存策略（Redis + 本地缓存）

      【写作要求】
      - 总行数目标：≥700行
      - 大屏设计要有具体的画面描述和交互逻辑
      - KPI计算公式要完整
      - 报表模板要可直接使用
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥700行
      2. 大屏数据展示层级L1-L4是否有完整描述
      3. 能量流向可视化（Sankey图）是否有具体描述
      4. 告警分级是否包含红/黄/蓝/灰四级标准
      5. KPI计算公式是否完整（含充放电效率/自耗电率/可用率）
      6. 报表模板是否包含日报/月报/年报
      7. 能效指标是否有具体的计算公式
      返回每项通过/不通过结论
    timeout_ms: 2700000

  - id: skill-digital-twin
    title: '新建储能数字孪生VR场站Skill'
    prompt: |
      任务：创建储能电站数字孪生虚拟现实场站Skill，文件输出到 E:\project\储能\ess-platform\skills\minimax_net_digital_twin_vr.md

      【Skill定位】
      本Skill用于：储能电站数字孪生VR虚拟现实系统的设计与实现，包含2D电气图→3D场景建模→实时数据绑定→动态信号流动画→VR模式→Web端/PC端/VR头盔多端支持。是储能场站数字化的核心技术Skill。

      【必须包含的核心模块】

      一、数字孪生系统架构
      - 整体架构（物理场站↔数字模型↔实时数据↔可视化层）
        · 物理层：真实PCS/BMS/电表/变压器
        · 通信层：MQTT/OPC-UA采集实时数据
        · 模型层：3D数字孪生模型（实时同步物理场站状态）
        · 可视化层：Web/PC/VR多端展示
      - 技术栈选型
        · 建模：Blender/3ds Max/SketchUp（3D建模）
        · 渲染：Three.js/Babylon.js（Web端3D渲染）
        · 实时数据：WebSocket/MQTT
        · VR：WebXR/A-Frame/Unity（VR端）
        · 格式：glTF/GLB（3D模型格式，轻量化）

      二、场站3D场景建模
      - 设备模型清单（需建模的所有设备）
        · PCS舱体（带散热风扇动画）
        · 电池舱体（带液冷管路可视化）
        · 变压器
        · 并网柜/开关柜
        · 电缆/母线槽
        · 光伏支架（如果有）
        · 场站建筑（配电房/综合楼）
      - 模型层级结构（LOD，Level of Detail）
        · LOD0：高精度模型（用于VR模式）
        · LOD1：中精度模型（用于Web详细视图）
        · LOD2：低精度模型（用于GIS地图总览）
      - 坐标系规范（场站GIS坐标→3D世界坐标映射）
      - 模型命名规范（设备ID/类型/版本号命名）

      三、动态信号流动画
      - 电气接线动态显示
        · 充放电状态下的功率箭头动画（电流方向指示）
        · 有功/无功功率用颜色区分（绿色=有功，蓝色=无功）
        · 电缆载流量用颜色热图显示（温度→颜色映射）
      - 数据驱动的状态渲染
        · PCS运行状态：待机（灰色）/并网（绿色）/故障（红色）
        · BMS SOC填充动画（0-100%颜色渐变）
        · 电池温度热图（蓝→绿→红）
        · 告警状态：设备边框闪烁（红色告警/黄色告警）
      - 时间回放功能
        · 选取任意时间段回放历史数据
        · 数据回放时的信号流动画

      四、实时数据绑定
      - 数据源接入
        · MQTT订阅实时遥测数据
        · OPC-UA数据接入（工业现场）
        · WebSocket推送架构
      - 数据模型映射
        · 设备ID → 3D模型ID映射表
        · 遥测数据字段 → 模型属性绑定
        · 告警数据 → 模型告警状态绑定
      - 刷新策略
        · 实时数据：≥1s刷新一次
        · 告警推送：即时更新，无需轮询
        · 历史数据：按需加载
      - 数据缓存和离线支持（IndexedDB本地缓存）

      五、VR场站漫游模式
      - VR场景设计
        · 默认视角（场站总览）
        · 设备视角（靠近某个设备时的视角切换）
        · 第一人称漫游（VR手柄控制移动）
        · 设备点击查询（指向设备→显示实时数据面板）
      - 交互功能
        · 告警响应：在VR中点击告警设备，高亮并弹出告警详情
        · 数据查询：指向设备显示实时数据
        · 远程操控：VR中直接下发控制指令（需要权限验证）
      - 性能优化
        · 模型面数优化（VR对帧率要求≥90fps）
        · 烘焙光照vs实时光照
        · 手柄追踪延迟控制

      六、Web端场站大屏
      - 2D电气图总览（SVG格式，一次接线图）
        · 点击设备跳转到3D对应设备
        · 电气图标注（设备名称/功率/状态）
        · 告警设备高亮闪烁
      - 3D场站视图
        · OrbitControls旋转/缩放/平移
        · 多视角预设（正视图/侧视图/俯视图/等轴测图）
        · 剖面视图（查看舱体内部结构）
      - 能量流向总览
        · 动态功率箭头动画
        · 颜色编码（SOC/温度/功率）

      七、项目交付清单
      - 数字孪生系统交付检查表（≥30项）
      - 模型交付格式要求
      - 数据接入接口规范
      - 性能指标要求（加载时间/帧率/数据延迟）

      【写作要求】
      - 总行数目标：≥900行
      - 技术实现要有具体的技术栈和代码架构
      - 信号流动画要有具体的动画描述
      - VR交互要有具体的操作步骤
      - 写完后报告：文件路径、总行数、核心亮点
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 文件存在，总行数≥900行
      2. 数字孪生系统架构是否有完整的四层描述（物理/通信/模型/可视化）
      3. 技术栈选型是否有具体工具（Three.js/Blender/WebXR等）
      4. 设备模型清单是否包含≥6种设备（PCS/电池舱/变压器/并网柜等）
      5. 动态信号流动画是否有具体的颜色和动画描述
      6. VR场景是否有具体的漫游和交互功能描述
